replicaCount: 1

fullnameOverride: api-gateway

image:
  repository: 873135413040.dkr.ecr.us-east-1.amazonaws.com/api-gateway
  tag: v1.0.2
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  host: dev.pharma.internal
  path: /api(/|$)(.*)
  pathType: ImplementationSpecific

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /actuator/health
  port: 8080
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  path: /actuator/health/readiness
  port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

configmap:
  SPRING_PROFILES_ACTIVE: dev
  DB_HOST: <RDS_ENDPOINT>
  LOG_LEVEL: DEBUG
  AUTH_SERVICE_URL: "http://auth-service-dev-pharma-service:8081"
  DRUG_CATALOG_URL: "http://catalog-service-dev-pharma-service:8082"
  NOTIFICATION_URL: "http://notification-service-dev-pharma-service:3000"
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"

envFrom:
  - secretRef:
      name: db-credentials
  - secretRef:
      name: jwt-secret

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/pharma-dev-gitlab-runner-role
  name: api-gateway
